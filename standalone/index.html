<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="儿童赛车">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <title>儿童赛车游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#4CB9E7',
                        accent: '#FFBE0B',
                        success: '#FB5607',
                        background: '#FFE5D9',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'spin-slow': 'spin 3s linear infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .btn-bounce {
                transition: all 0.3s ease;
            }
            .btn-bounce:hover {
                transform: translateY(-3px);
            }
            .btn-bounce:active {
                transform: translateY(1px);
            }
            .car-card {
                transition: all 0.3s ease;
            }
            .car-card:hover {
                transform: translateY(-5px) scale(1.05);
            }
            .car-card.selected {
                border-color: #FFBE0B;
                border-width: 4px;
                transform: scale(1.1);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.3);
            }
        }
    </style>
    <style>
        body {
            background-color: #FFE5D9;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .ui-overlay > * {
            pointer-events: auto;
        }
        
        .control-buttons {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 20;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.8);
            border: none;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255, 107, 53, 1);
        }
        
        .screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }
        
        .screen.active {
            display: flex;
        }
        
        .loading-screen {
            background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .main-menu {
            background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            color: white;
            padding: 20px;
        }
        
        .car-selection {
            background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            color: white;
            padding: 20px;
        }
        
        .rewards-screen {
            background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            color: white;
            padding: 20px;
        }
        
        .settings-screen {
            background: linear-gradient(135deg, #4CB9E7 0%, #FF6B35 100%);
            color: white;
            padding: 20px;
        }
        
        .game-over-screen {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .car-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
        }
        
        .car-card img {
            width: 100px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        .car-card.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }
        
        .car-card.locked::after {
            content: '🔒';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
        }
        
        .star-display {
            color: #FFBE0B;
            font-size: 24px;
            margin: 10px 0;
        }
        
        .coin-display {
            color: #FFBE0B;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 34px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #FF6B35;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B35, #FFBE0B);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .powerup-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 190, 11, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .shield-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 3px solid rgba(76, 185, 231, 0.7);
            border-radius: 50%;
            animation: pulse 1s infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.4;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .raindrop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: rgba(76, 185, 231, 0.6);
            pointer-events: none;
        }
        
        .notification {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 100;
            animation: fadeInOut 2s ease-in-out;
            pointer-events: none;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .control-buttons {
                padding: 0 10px;
            }
            
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .car-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 15px;
            }
            
            .car-card img {
                width: 80px;
                height: 50px;
            }
        }
        
        @media (max-width: 480px) {
            .car-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 游戏容器 -->
    <div class="game-container">
        <!-- 加载屏幕 -->
        <div id="loading-screen" class="screen active loading-screen">
            <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/474815b7721541fd84c4e50eebb37038~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260226163046D5AA96EDE39C5ECD76AE&rrcfp=f06b921b&x-expires=1774686736&x-signature=0orZ37CMtsY4iUnc6P25vYkpgFU%3D" alt="Logo" class="w-32 h-32 mb-4 animate-bounce">
            <h1 class="text-5xl font-bold text-primary mb-4 text-shadow">儿童赛车游戏</h1>
            <div class="progress-bar w-64">
                <div id="loading-progress" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="loading-text" class="mt-4 text-lg">正在加载游戏资源...</p>
        </div>

        <!-- 主菜单 -->
        <div id="main-menu" class="screen main-menu flex flex-col items-center justify-center">
            <h1 class="text-5xl font-bold text-primary mb-8 text-center text-shadow">儿童赛车</h1>
            <div class="flex flex-col gap-4">
                <button id="start-game-btn" class="btn btn-bounce bg-primary hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg flex items-center justify-center gap-2 animate-pulse" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3); border: 4px solid #FFBE0B; box-shadow: 0 8px 16px rgba(0,0,0,0.2), 0 0 20px rgba(255, 190, 11, 0.5);">
                    <img src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/4c7a4eccaa8944b085062681d5310d17~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260226155542CD7EBB8E31F3B981138D&rrcfp=f06b921b&x-expires=1774685017&x-signature=ac8WDk63VEeVAuA3GmUDHnRdZ%2F4%3D" alt="赛车" class="w-8 h-8 mr-2">
                    开始比赛
                </button>
                <button id="garage-btn" class="btn btn-bounce bg-secondary hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg flex items-center justify-center gap-2">
                    <i class="fa fa-car text-2xl"></i>
                    我的车库
                </button>
                <button id="rewards-btn" class="btn btn-bounce bg-accent hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg flex items-center justify-center gap-2">
                    <i class="fa fa-gift text-2xl"></i>
                    奖励
                </button>
                <button id="settings-btn" class="btn btn-bounce bg-gray-500 hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg flex items-center justify-center gap-2">
                    <i class="fa fa-cog text-2xl"></i>
                    设置
                </button>
            </div>
            <div class="mt-8 text-center">
                <div class="coin-display mb-2">
                    <i class="fa fa-star text-yellow-400"></i>
                    <span id="total-stars">0</span>
                </div>
                <div class="text-sm opacity-80">版本 1.0.0</div>
            </div>
        </div>

        <!-- 赛车选择 -->
        <div id="car-selection" class="screen car-selection flex flex-col">
            <button class="back-button" onclick="showScreen('mainMenu')">
                <i class="fa fa-arrow-left"></i>
            </button>
            <h2 class="text-4xl font-bold text-primary mb-6 text-shadow">选择你的赛车</h2>
            <div class="car-grid" id="car-grid">
                <!-- 赛车卡片将通过 JavaScript 动态生成 -->
            </div>
            <div class="mt-auto mb-8">
                <button id="select-car-btn" class="btn btn-bounce bg-success hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg w-full">
                    选择赛车
                </button>
            </div>
        </div>

        <!-- 奖励屏幕 -->
        <div id="rewards-screen" class="screen rewards-screen flex flex-col">
            <button class="back-button" onclick="showScreen('mainMenu')">
                <i class="fa fa-arrow-left"></i>
            </button>
            <h2 class="text-4xl font-bold text-primary mb-6 text-shadow">我的奖励</h2>
            <div class="flex justify-between items-center mb-6">
                <div class="coin-display">
                    <i class="fa fa-star text-yellow-400"></i>
                    <span id="rewards-stars">0</span>
                </div>
                <div class="text-xl">
                    完成比赛: <span id="races-completed">0</span>
                </div>
            </div>
            <div id="rewards-list" class="space-y-4">
                <!-- 奖励列表将通过 JavaScript 动态生成 -->
            </div>
        </div>

        <!-- 设置屏幕 -->
        <div id="settings-screen" class="screen settings-screen flex flex-col">
            <button class="back-button" onclick="showScreen('mainMenu')">
                <i class="fa fa-arrow-left"></i>
            </button>
            <h2 class="text-4xl font-bold text-primary mb-6 text-shadow">设置</h2>
            <div class="space-y-6">
                <div class="settings-option">
                    <span class="text-xl">音效</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-option">
                    <span class="text-xl">振动</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vibration-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-option">
                    <span class="text-xl">难度</span>
                    <select id="difficulty-select" class="bg-white bg-opacity-20 border-2 border-white border-opacity-30 rounded-lg px-4 py-2 text-white">
                        <option value="easy">简单</option>
                        <option value="medium" selected>中等</option>
                        <option value="hard">困难</option>
                    </select>
                </div>
                <div class="settings-option">
                    <span class="text-xl">控制方式</span>
                    <select id="control-select" class="bg-white bg-opacity-20 border-2 border-white border-opacity-30 rounded-lg px-4 py-2 text-white">
                        <option value="touch">触摸滑动</option>
                        <option value="buttons">虚拟按钮</option>
                        <option value="tilt">倾斜控制</option>
                    </select>
                </div>
            </div>
            <div class="mt-auto mb-8">
                <button id="save-settings-btn" class="btn btn-bounce bg-success hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg w-full">
                    保存设置
                </button>
            </div>
        </div>

        <!-- 游戏屏幕 -->
        <div id="game-screen" class="screen">
            <canvas id="game-canvas"></canvas>
            <div class="ui-overlay">
                <!-- 游戏UI元素 -->
                <div class="absolute top-4 left-4 bg-black bg-opacity-50 text-white p-2 rounded-lg">
                    <div class="text-lg font-bold">得分: <span id="score-display">0</span></div>
                    <div class="text-sm">最高分: <span id="high-score-display">0</span></div>
                </div>
                <div class="absolute top-4 right-4 bg-black bg-opacity-50 text-white p-2 rounded-lg">
                    <div class="text-lg">时间: <span id="time-display">00:00</span></div>
                </div>
                <div id="powerup-indicator" class="powerup-indicator">
                    <i class="fa fa-bolt"></i>
                    <span>速度提升!</span>
                </div>
            </div>
            <!-- 控制按钮 -->
            <div class="control-buttons">
                <button class="control-btn" id="left-btn">
                    <i class="fa fa-arrow-left"></i>
                </button>
                <button class="control-btn" id="right-btn">
                    <i class="fa fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- 游戏结束屏幕 -->
        <div id="game-over-screen" class="screen game-over-screen">
            <h2 class="text-5xl font-bold text-primary mb-4 text-shadow">游戏结束</h2>
            <div class="star-display mb-4">
                <span id="game-over-stars">★★☆</span>
            </div>
            <div class="text-3xl mb-2">得分: <span id="final-score">0</span></div>
            <div class="text-xl mb-6">时间: <span id="final-time">00:00</span></div>
            <div id="reward-notification" class="text-xl mb-6 text-accent" style="display: none;">
                🏆 新奖励解锁!
            </div>
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button id="play-again-btn" class="btn btn-bounce bg-primary hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg">
                    再玩一次
                </button>
                <button id="back-to-menu-btn" class="btn btn-bounce bg-secondary hover:bg-opacity-90 text-white text-2xl py-4 px-8 rounded-full shadow-lg">
                    返回菜单
                </button>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            currentScreen: 'loading',
            selectedCar: 0,
            score: 0,
            highScore: 0,
            time: 0,
            bestTime: Infinity,
            totalStars: 0,
            racesCompleted: 0,
            coins: 0,
            ownedCars: [0, 1], // Red and Yellow cars are initially owned
            settings: {
                sound: true,
                music: true,
                vibration: true,
                difficulty: 'medium'
            },
            isGameRunning: false,
            isPaused: false,
            powerUps: {
                speedBoost: false,
                shield: false
            },
            weather: 'sunny', // sunny, rainy
            baseSpeed: 3,
            maxSpeed: 15,
            lastTime: 0,
            lastScoreUpdate: 0
        };

        // 游戏资源
        const assets = {
            cars: [
                { name: '红色赛车', speed: 3, handling: 3, image: 'https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/4bb1366777c2417dbbfe8595ef837b47~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683994&x-signature=XPTkMDqqNh%2Boc%2BeQ7kqWjGxFpwM%3D' },
                { name: '黄色闪电', speed: 4, handling: 2, image: 'https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/4bb1366777c2417dbbfe8595ef837b47~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683994&x-signature=XPTkMDqqNh%2Boc%2BeQ7kqWjGxFpwM%3D' },
                { name: '绿色机器', speed: 5, handling: 1, image: 'https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/4bb1366777c2417dbbfe8595ef837b47~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683994&x-signature=XPTkMDqqNh%2Boc%2BeQ7kqWjGxFpwM%3D' },

                { type: 'rock', image: 'https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/c10cc9a3366348a0bb78f6a59fb1f1a2~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683971&x-signature=oJO31VKVun8wuosBxAWcCDW2Leg%3D' },
                { type: 'car', image: 'https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/c10cc9a3366348a0bb78f6a59fb1f1a2~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683971&x-signature=oJO31VKVun8wuosBxAWcCDW2Leg%3D' }
            ],
            powerUps: [
                { type: 'speed', name: '速度提升', image: 'https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/ec17589f84e5411f893281c1e2c3232c~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683975&x-signature=2BPwSlcHE2a9mX0m96xYgIa2gho%3D' },
                { type: 'shield', name: '护盾', image: 'https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/ec17589f84e5411f893281c1e2c3232c~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683975&x-signature=2BPwSlcHE2a9mX0m96xYgIa2gho%3D' }
            ],
            track: {
                image: 'https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/9cdbb912f97c43ab86a4b49f5506646c~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022615454331048280F0C2BEE809D9&rrcfp=f06b921b&x-expires=1774683971&x-signature=3ZrSUxdgDgnQm8HevTwAt4SXots%3D'
            }
        };

        // 游戏变量
        let canvas, ctx;
        let gameLoop;
        let startTime;
        let lastTime = 0;
        let frameCount = 0;
        let isPaused = false;
        let roadOffset = 0;
        let carPosition = { x: 0, y: 0 };
        let obstacles = [];
        let powerUps = [];
        let particles = [];
        let weatherParticles = [];
        let keys = {};
        let isTouching = false;
        let touchStartX = 0;
        let touchCurrentX = 0;
        let powerUpDuration = 0;
        let shieldDuration = 0;
        let scoreMultiplier = 1;
        let obstacleSpawnRate = 60;
        let powerUpSpawnRate = 120;
        let notifications = [];

        // 屏幕元素
        const screens = {
            loading: document.getElementById('loading-screen'),
            mainMenu: document.getElementById('main-menu'),
            carSelection: document.getElementById('car-selection'),
            rewards: document.getElementById('rewards-screen'),
            settings: document.getElementById('settings-screen'),
            game: document.getElementById('game-screen'),
            gameOver: document.getElementById('game-over-screen')
        };

        // 初始化游戏
        function initGame() {
            console.log('初始化游戏...');
            
            // 加载保存的游戏数据
            loadGameData();
            
            // 模拟加载过程
            simulateLoading();
            
            // 设置事件监听器
            setupEventListeners();
        }

        // 模拟加载过程
        function simulateLoading() {
            const progressBar = document.getElementById('loading-progress');
            const loadingText = document.getElementById('loading-text');
            let progress = 0;
            
            const loadingSteps = [
                '加载游戏资源...',
                '初始化赛车...',
                '准备赛道...',
                '设置天气系统...',
                '加载奖励系统...',
                '游戏准备就绪!'
            ];
            
            const interval = setInterval(() => {
                progress += 5;
                progressBar.style.width = progress + '%';
                
                const stepIndex = Math.floor(progress / 20);
                if (stepIndex < loadingSteps.length) {
                    loadingText.textContent = loadingSteps[stepIndex];
                }
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        showScreen('mainMenu');
                    }, 1000);
                }
            }, 100);
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 主菜单按钮
            document.getElementById('start-game-btn').addEventListener('click', () => {
                showScreen('carSelection');
            });
            
            document.getElementById('garage-btn').addEventListener('click', () => {
                showScreen('carSelection');
            });
            
            document.getElementById('rewards-btn').addEventListener('click', () => {
                showScreen('rewards');
            });
            
            document.getElementById('settings-btn').addEventListener('click', () => {
                showScreen('settings');
            });
            
            // 赛车选择按钮
            document.getElementById('select-car-btn').addEventListener('click', () => {
                startGame();
            });
            
            // 设置按钮
            document.getElementById('save-settings-btn').addEventListener('click', saveSettings);
            
            // 游戏结束按钮
            document.getElementById('play-again-btn').addEventListener('click', startGame);
            document.getElementById('back-to-menu-btn').addEventListener('click', () => {
                showScreen('mainMenu');
            });
            
            // 键盘事件
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);
            
            // 触摸事件
            document.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', handleTouchEnd);
            
            // 控制按钮事件
            document.getElementById('left-btn').addEventListener('touchstart', () => {
                keys['ArrowLeft'] = true;
            });
            document.getElementById('left-btn').addEventListener('touchend', () => {
                keys['ArrowLeft'] = false;
            });
            document.getElementById('left-btn').addEventListener('mousedown', () => {
                keys['ArrowLeft'] = true;
            });
            document.getElementById('left-btn').addEventListener('mouseup', () => {
                keys['ArrowLeft'] = false;
            });
            
            document.getElementById('right-btn').addEventListener('touchstart', () => {
                keys['ArrowRight'] = true;
            });
            document.getElementById('right-btn').addEventListener('touchend', () => {
                keys['ArrowRight'] = false;
            });
            document.getElementById('right-btn').addEventListener('mousedown', () => {
                keys['ArrowRight'] = true;
            });
            document.getElementById('right-btn').addEventListener('mouseup', () => {
                keys['ArrowRight'] = false;
            });
            
            // 窗口大小改变事件
            window.addEventListener('resize', handleResize);
            
            // 页面可见性改变事件
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }

        // 处理键盘按下事件
        function handleKeyDown(event) {
            keys[event.key] = true;
            
            // 防止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(event.key)) {
                event.preventDefault();
            }
        }

        // 处理键盘释放事件
        function handleKeyUp(event) {
            keys[event.key] = false;
        }

        // 处理触摸开始事件
        function handleTouchStart(event) {
            event.preventDefault();
            if (event.touches.length > 0) {
                isTouching = true;
                touchStartX = event.touches[0].clientX;
                touchCurrentX = touchStartX;
            }
        }

        // 处理触摸移动事件
        function handleTouchMove(event) {
            event.preventDefault();
            if (isTouching && event.touches.length > 0) {
                touchCurrentX = event.touches[0].clientX;
            }
        }

        // 处理触摸结束事件
        function handleTouchEnd() {
            isTouching = false;
        }

        // 处理窗口大小改变事件
        function handleResize() {
            if (canvas) {
                resizeCanvas();
            }
        }

        // 处理页面可见性改变事件
        function handleVisibilityChange() {
            if (document.hidden) {
                handlePause();
            } else {
                handleResume();
            }
        }

        // 处理暂停
        function handlePause() {
            if (gameState.isGameRunning && !isPaused) {
                isPaused = true;
                cancelAnimationFrame(gameLoop);
            }
        }

        // 处理恢复
        function handleResume() {
            if (gameState.isGameRunning && isPaused) {
                isPaused = false;
                lastTime = performance.now();
                gameLoop = requestAnimationFrame(updateGame);
            }
        }

        // 显示特定屏幕
        function showScreen(screenName) {
            // 隐藏所有屏幕
            Object.values(screens).forEach(screen => {
                screen.classList.remove('active');
            });
            
            // 显示选定的屏幕
            screens[screenName].classList.add('active');
            gameState.currentScreen = screenName;
            
            // 如果显示游戏屏幕，初始化画布
            if (screenName === 'game') {
                initCanvas();
            } else if (screenName === 'carSelection') {
                populateCarSelection();
            } else if (screenName === 'rewards') {
                populateRewards();
            } else if (screenName === 'settings') {
                populateSettings();
            }
        }

        // 初始化画布
        function initCanvas() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            
            // 开始游戏循环
            if (!gameState.isGameRunning) {
                startGameLoop();
            }
        }

        // 调整画布大小
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        // 填充赛车选择
        function populateCarSelection() {
            const carGrid = document.getElementById('car-grid');
            carGrid.innerHTML = '';
            
            assets.cars.forEach((car, index) => {
                const isOwned = gameState.ownedCars.includes(index);
                const isSelected = gameState.selectedCar === index;
                
                const carCard = document.createElement('div');
                carCard.className = `car-card relative ${isSelected ? 'selected' : ''} ${!isOwned ? 'locked' : ''}`;
                carCard.innerHTML = `
                    <img src="${car.image}" alt="${car.name}" class="car-image">
                    <h3 class="text-lg font-bold">${car.name}</h3>
                    <div class="text-sm opacity-80">
                        速度: ${'★'.repeat(car.speed)}
                    </div>
                    <div class="text-sm opacity-80">
                        操控: ${'★'.repeat(car.handling)}
                    </div>
                    ${!isOwned ? `<div class="mt-2 text-accent">需要 ${(index + 1) * 5} 颗星</div>` : ''}
                `;
                
                if (isOwned) {
                    carCard.addEventListener('click', () => {
                        gameState.selectedCar = index;
                        populateCarSelection();
                    });
                }
                
                carGrid.appendChild(carCard);
            });
        }

        // 填充奖励
        function populateRewards() {
            document.getElementById('rewards-stars').textContent = gameState.totalStars;
            document.getElementById('races-completed').textContent = gameState.racesCompleted;
            
            const rewardsList = document.getElementById('rewards-list');
            rewardsList.innerHTML = '';
            
            // 示例奖励
            const rewards = [
                { id: 'car2', name: '绿色机器赛车', requirement: '10颗星', unlocked: gameState.ownedCars.includes(2) },
                { id: 'car3', name: '蓝色闪电赛车', requirement: '15颗星', unlocked: gameState.ownedCars.includes(3) },
                { id: 'weather', name: '雨天模式', requirement: '完成5场比赛', unlocked: gameState.racesCompleted >= 5 },
                { id: 'expert', name: '专家难度', requirement: '获得20颗星', unlocked: gameState.totalStars >= 20 }
            ];
            
            rewards.forEach(reward => {
                const rewardItem = document.createElement('div');
                rewardItem.className = `bg-white bg-opacity-20 rounded-lg p-4 flex justify-between items-center ${reward.unlocked ? 'opacity-100' : 'opacity-50'}`;
                rewardItem.innerHTML = `
                    <div>
                        <h3 class="text-lg font-bold">${reward.name}</h3>
                        <p class="text-sm opacity-80">${reward.requirement}</p>
                    </div>
                    <div class="text-2xl">${reward.unlocked ? '✅' : '🔒'}</div>
                `;
                rewardsList.appendChild(rewardItem);
            });
        }

        // 填充设置
        function populateSettings() {
            document.getElementById('sound-toggle').checked = gameState.settings.sound;
            document.getElementById('vibration-toggle').checked = gameState.settings.vibration;
            document.getElementById('difficulty-select').value = gameState.settings.difficulty;
            document.getElementById('control-select').value = gameState.settings.control || 'touch';
        }

        // 保存设置
        function saveSettings() {
            gameState.settings.sound = document.getElementById('sound-toggle').checked;
            gameState.settings.vibration = document.getElementById('vibration-toggle').checked;
            gameState.settings.difficulty = document.getElementById('difficulty-select').value;
            gameState.settings.control = document.getElementById('control-select').value;
            
            // 根据难度设置调整游戏参数
            switch (gameState.settings.difficulty) {
                case 'easy':
                    gameState.baseSpeed = 2;
                    obstacleSpawnRate = 80;
                    break;
                case 'medium':
                    gameState.baseSpeed = 3;
                    obstacleSpawnRate = 60;
                    break;
                case 'hard':
                    gameState.baseSpeed = 4;
                    obstacleSpawnRate = 40;
                    break;
            }
            
            // 保存到本地存储
            localStorage.setItem('gameSettings', JSON.stringify(gameState.settings));
            
            showNotification('设置已保存!');
            setTimeout(() => {
                showScreen('mainMenu');
            }, 1000);
        }

        // 开始游戏
        function startGame() {
            gameState.isGameRunning = true;
            gameState.isPaused = false;
            gameState.score = 0;
            gameState.time = 0;
            gameState.powerUps.speedBoost = false;
            gameState.powerUps.shield = false;
            
            obstacles = [];
            powerUps = [];
            particles = [];
            weatherParticles = [];
            
            roadOffset = 0;
            carPosition = { x: canvas.width / 2, y: canvas.height - 150 };
            
            startTime = Date.now();
            lastTime = performance.now();
            
            // 随机天气
            if (gameState.racesCompleted >= 5 && Math.random() < 0.3) {
                gameState.weather = 'rainy';
            } else {
                gameState.weather = 'sunny';
            }
            
            showScreen('game');
            startGameLoop();
        }

        // 开始游戏循环
        function startGameLoop() {
            lastTime = performance.now();
            gameLoop = requestAnimationFrame(updateGame);
        }

        // 更新游戏
        function updateGame(timestamp) {
            if (!gameState.isGameRunning || isPaused) return;
            
            // 计算增量时间并标准化为60fps
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            const normalizedDelta = Math.min(deltaTime / 16.67, 2); // 最高2倍速度
            
            // 更新游戏时间
            gameState.time = Math.floor((Date.now() - startTime) / 1000);
            updateTimeDisplay();
            
            // 更新速度，具有动态进度
            let currentSpeed = gameState.baseSpeed + (gameState.score / 1000) * 0.5;
            currentSpeed = Math.min(currentSpeed, gameState.maxSpeed);
            
            // 应用速度提升道具
            if (gameState.powerUps.speedBoost) {
                currentSpeed *= 1.5;
                powerUpDuration -= normalizedDelta;
                if (powerUpDuration <= 0) {
                    gameState.powerUps.speedBoost = false;
                    document.getElementById('powerup-indicator').style.display = 'none';
                    showNotification('速度提升结束！');
                }
            }
            
            // 更新护盾持续时间
            if (gameState.powerUps.shield) {
                shieldDuration -= normalizedDelta;
                if (shieldDuration <= 0) {
                    gameState.powerUps.shield = false;
                    const shieldEffect = document.querySelector('.shield-effect');
                    if (shieldEffect) shieldEffect.remove();
                    showNotification('护盾消失！');
                }
            }
            
            // 平滑滚动更新道路偏移
            roadOffset += currentSpeed * normalizedDelta;
            if (roadOffset >= canvas.height) {
                roadOffset = 0;
            }
            
            // 处理输入，优化控制
            handleInput();
            
            // 基于游戏进度的动态障碍物生成
            const dynamicSpawnRate = Math.max(20, obstacleSpawnRate - Math.floor(gameState.score / 500));
            if (frameCount % dynamicSpawnRate === 0) {
                spawnObstacle();
            }
            
            // 生成道具，具有动态概率
            const powerUpChance = 0.2 + (gameState.score / 2000) * 0.1;
            if (frameCount % powerUpSpawnRate === 0 && Math.random() < powerUpChance) {
                spawnPowerUp();
            }
            
            // 更新障碍物
            updateObstacles(currentSpeed, normalizedDelta);
            
            // 更新道具
            updatePowerUps(currentSpeed, normalizedDelta);
            
            // 更新粒子
            updateParticles();
            
            // 更新天气效果
            updateWeather();
            
            // 更新通知
            updateNotifications();
            
            // 使用增量时间更新分数
            gameState.score += Math.floor(normalizedDelta * 2);
            gameState.highScore = Math.max(gameState.highScore, gameState.score);
            
            // 更新UI显示
            updateUI();
            
            frameCount++;
            
            // 继续游戏循环
            gameLoop = requestAnimationFrame(updateGame);
        }

        // 处理输入
        function handleInput() {
            // 键盘控制
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                carPosition.x -= 10; // 增加速度以提高响应性
            }
            
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                carPosition.x += 10; // 增加速度以提高响应性
            }
            
            // 触摸控制 - 针对更平滑的移动进行优化
            if (isTouching) {
                const deltaX = touchCurrentX - touchStartX;
                // 使用指数缩放以获得更响应的触摸
                const scaledDelta = deltaX * 0.15 * (Math.abs(deltaX) > 5 ? 1.5 : 1);
                carPosition.x += scaledDelta;
                touchStartX = touchCurrentX;
            }
            
            // 保持汽车在道路上，具有平滑的边界处理
            const carWidth = 80;
            const roadLeft = canvas.width * 0.2;
            const roadRight = canvas.width * 0.8;
            
            if (carPosition.x - carWidth / 2 < roadLeft) {
                // 平滑反弹效果
                carPosition.x = roadLeft + carWidth / 2 + 5;
                createParticles(carPosition.x, carPosition.y, 'left');
                
                // 碰撞时振动
                if (gameState.settings.vibration && navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }
            
            if (carPosition.x + carWidth / 2 > roadRight) {
                // 平滑反弹效果
                carPosition.x = roadRight - carWidth / 2 - 5;
                createParticles(carPosition.x, carPosition.y, 'right');
                
                // 碰撞时振动
                if (gameState.settings.vibration && navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }
        }

        // 生成障碍物
        function spawnObstacle() {
            const roadLeft = canvas.width * 0.2;
            const roadRight = canvas.width * 0.8;
            const obstacleWidth = 60;
            
            const obstacle = {
                type: assets.obstacles[Math.floor(Math.random() * assets.obstacles.length)],
                x: roadLeft + obstacleWidth / 2 + Math.random() * (roadRight - roadLeft - obstacleWidth),
                y: -obstacleWidth,
                width: obstacleWidth,
                height: obstacleWidth
            };
            
            obstacles.push(obstacle);
        }

        // 生成道具
        function spawnPowerUp() {
            const roadLeft = canvas.width * 0.2;
            const roadRight = canvas.width * 0.8;
            const powerUpWidth = 50;
            
            const powerUp = {
                type: assets.powerUps[Math.floor(Math.random() * assets.powerUps.length)],
                x: roadLeft + powerUpWidth / 2 + Math.random() * (roadRight - roadLeft - powerUpWidth),
                y: -powerUpWidth,
                width: powerUpWidth,
                height: powerUpWidth
            };
            
            powerUps.push(powerUp);
        }

        // 更新障碍物
        function updateObstacles(currentSpeed, deltaTime) {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                obstacle.y += currentSpeed * deltaTime;
                
                // 检查与汽车的碰撞
                if (checkCollision(carPosition, { width: 80, height: 120 }, obstacle)) {
                    if (gameState.powerUps.shield) {
                        // 如果有护盾，销毁障碍物
                        obstacles.splice(i, 1);
                        gameState.powerUps.shield = false;
                        const shieldEffect = document.querySelector('.shield-effect');
                        if (shieldEffect) shieldEffect.remove();
                        showNotification('护盾已激活！');
                    } else {
                        // 游戏结束
                        endGame();
                        return;
                    }
                }
                
                // 移除屏幕外的障碍物
                if (obstacle.y > canvas.height) {
                    obstacles.splice(i, 1);
                }
            }
        }

        // 更新道具
        function updatePowerUps(currentSpeed, deltaTime) {
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const powerUp = powerUps[i];
                powerUp.y += currentSpeed * deltaTime;
                
                // 检查与汽车的碰撞
                if (checkCollision(carPosition, { width: 80, height: 120 }, powerUp)) {
                    collectPowerUp(powerUp.type);
                    powerUps.splice(i, 1);
                }
                
                // 移除屏幕外的道具
                if (powerUp.y > canvas.height) {
                    powerUps.splice(i, 1);
                }
            }
        }

        // 收集道具
        function collectPowerUp(type) {
            switch (type.type) {
                case 'speed':
                    gameState.powerUps.speedBoost = true;
                    powerUpDuration = 60; // 60帧 = 1秒
                    document.getElementById('powerup-indicator').style.display = 'flex';
                    showNotification('速度提升！');
                    break;
                case 'shield':
                    gameState.powerUps.shield = true;
                    shieldDuration = 90; // 90帧 = 1.5秒
                    
                    // 添加护盾视觉效果
                    let shieldEffect = document.querySelector('.shield-effect');
                    if (!shieldEffect) {
                        shieldEffect = document.createElement('div');
                        shieldEffect.className = 'shield-effect';
                        document.querySelector('.ui-overlay').appendChild(shieldEffect);
                    }
                    
                    showNotification('护盾已激活！');
                    break;
            }
            
            // 收集时振动
            if (gameState.settings.vibration && navigator.vibrate) {
                navigator.vibrate(30);
            }
        }

        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                
                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 更新天气效果
        function updateWeather() {
            // 更新雨水
            if (gameState.weather === 'rainy') {
                // 添加新雨滴
                if (frameCount % 3 === 0) {
                    createRaindrop();
                }
                
                // 更新现有雨滴
                for (let i = weatherParticles.length - 1; i >= 0; i--) {
                    const drop = weatherParticles[i];
                    drop.y += drop.speed;
                    
                    if (drop.y > canvas.height) {
                        weatherParticles.splice(i, 1);
                    }
                }
            }
        }

        // 更新通知
        function updateNotifications() {
            for (let i = notifications.length - 1; i >= 0; i--) {
                const notification = notifications[i];
                notification.life--;
                
                if (notification.life <= 0) {
                    notification.element.remove();
                    notifications.splice(i, 1);
                }
            }
        }

        // 检查碰撞
        function checkCollision(rect1, size1, rect2) {
            return rect1.x - size1.width / 2 < rect2.x + rect2.width / 2 &&
                   rect1.x + size1.width / 2 > rect2.x - rect2.width / 2 &&
                   rect1.y - size1.height / 2 < rect2.y + rect2.height / 2 &&
                   rect1.y + size1.height / 2 > rect2.y - rect2.height / 2;
        }

        // 创建粒子
        function createParticles(x, y, direction) {
            for (let i = 0; i < 10; i++) {
                const particle = {
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10 * (direction === 'left' ? -1 : 1),
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 30
                };
                particles.push(particle);
            }
        }

        // 创建雨滴
        function createRaindrop() {
            const raindrop = {
                x: Math.random() * canvas.width,
                y: -20,
                speed: 10 + Math.random() * 5
            };
            weatherParticles.push(raindrop);
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            notifications.push({
                element: notification,
                life: 120
            });
        }

        // 更新UI显示
        function updateUI() {
            document.getElementById('score-display').textContent = gameState.score;
            document.getElementById('high-score-display').textContent = gameState.highScore;
            document.getElementById('total-stars').textContent = gameState.totalStars;
        }

        // 更新时间显示
        function updateTimeDisplay() {
            const minutes = Math.floor(gameState.time / 60);
            const seconds = gameState.time % 60;
            document.getElementById('time-display').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // 结束游戏
        function endGame() {
            gameState.isGameRunning = false;
            cancelAnimationFrame(gameLoop);
            
            // 计算星星数量
            let stars = 0;
            if (gameState.score >= 500) stars = 3;
            else if (gameState.score >= 300) stars = 2;
            else if (gameState.score >= 100) stars = 1;
            
            // 更新游戏统计数据
            gameState.totalStars += stars;
            gameState.racesCompleted++;
            
            // 检查是否解锁新赛车
            let unlockedCar = -1;
            if (gameState.totalStars >= 10 && !gameState.ownedCars.includes(2)) {
                gameState.ownedCars.push(2);
                unlockedCar = 2;
            } else if (gameState.totalStars >= 15 && !gameState.ownedCars.includes(3)) {
                gameState.ownedCars.push(3);
                unlockedCar = 3;
            }
            
            // 保存游戏数据
            saveGameData();
            
            // 更新游戏结束屏幕
            document.getElementById('game-over-stars').textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
            document.getElementById('final-score').textContent = gameState.score;
            
            const minutes = Math.floor(gameState.time / 60);
            const seconds = gameState.time % 60;
            document.getElementById('final-time').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 显示奖励通知
            const rewardNotification = document.getElementById('reward-notification');
            if (unlockedCar !== -1) {
                rewardNotification.style.display = 'block';
                rewardNotification.textContent = `🏆 新赛车解锁: ${assets.cars[unlockedCar].name}!`;
            } else {
                rewardNotification.style.display = 'none';
            }
            
            // 显示游戏结束屏幕
            showScreen('gameOver');
        }

        // 保存游戏数据
        function saveGameData() {
            const dataToSave = {
                highScore: gameState.highScore,
                totalStars: gameState.totalStars,
                racesCompleted: gameState.racesCompleted,
                ownedCars: gameState.ownedCars,
                settings: gameState.settings
            };
            
            localStorage.setItem('gameData', JSON.stringify(dataToSave));
        }

        // 加载游戏数据
        function loadGameData() {
            const savedData = localStorage.getItem('gameData');
            if (savedData) {
                const data = JSON.parse(savedData);
                gameState.highScore = data.highScore || 0;
                gameState.totalStars = data.totalStars || 0;
                gameState.racesCompleted = data.racesCompleted || 0;
                gameState.ownedCars = data.ownedCars || [0, 1];
                gameState.settings = data.settings || gameState.settings;
            }
        }

        // 当DOM加载完成时初始化游戏
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
